<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — BlackRoad OS</title>
  <style>
    :root {
      --pink: #FF1D6C;
      --amber: #F5A623;
      --blue: #2979FF;
      --violet: #9C27B0;
      --gradient: linear-gradient(135deg, #F5A623 0%, #FF1D6C 38.2%, #9C27B0 61.8%, #2979FF 100%);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 34px;
      -webkit-font-smoothing: antialiased;
    }
    .num {
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 21px;
    }
    h1 { font-size: clamp(22px, 4vw, 36px); font-weight: 700; margin-bottom: 13px; }
    p { font-size: 16px; color: #888; margin-bottom: 34px; max-width: 400px; line-height: 1.618; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 34px;
      background: var(--pink);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,29,108,0.4); }
  </style>
</head>
<body>
  <div class="num">404</div>
  <h1>Page not found</h1>
  <p>This link doesn't exist yet — but the portal does.</p>
  <a href="/">✨ Back to BlackRoad OS</a>
</body>
</html>
